<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Vanderbus GPS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0f1a;
      --surface:  #131c2e;
      --surface2: #1a2540;
      --border:   #2a3a5a;
      --text:     #edf2ff;
      --muted:    #7a8fba;
      --green:    #22c55e;
      --green-bg: rgba(34,197,94,0.10);
      --red:      #ef4444;
      --red-bg:   rgba(239,68,68,0.10);
      --amber:    #f59e0b;
      --radius:   14px;
      --r-sm:     8px;
    }

    html { height: 100%; }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 17px;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 0)
               env(safe-area-inset-bottom, 16px) env(safe-area-inset-left, 0);
    }

    .wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 28px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--green);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }

    /* Form */
    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 22px;
      font-weight: 600;
      font-family: inherit;
      outline: none;
      transition: border-color 0.12s;
      -webkit-appearance: none;
      caret-color: var(--green);
    }

    input[type="text"]::placeholder {
      color: var(--border);
      font-weight: 400;
      font-size: 18px;
    }

    input[type="text"]:focus {
      border-color: var(--green);
    }

    input[type="text"]:disabled {
      opacity: 0.5;
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 64px;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 20px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.12s, transform 0.08s;
      -webkit-appearance: none;
      touch-action: manipulation;
      user-select: none;
    }

    .btn:active:not(:disabled) {
      transform: scale(0.975);
      opacity: 0.82;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .btn-start {
      background: var(--green);
      color: #fff;
    }

    .btn-stop {
      background: var(--red);
      color: #fff;
    }

    /* Status panel */
    .status-panel {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .status-panel.visible { display: flex; }

    /* Live badge */
    .live-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .pulse-ring {
      position: relative;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--green);
    }

    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid var(--green);
      opacity: 0;
      animation: ping 2.4s ease-out infinite;
    }

    .pulse-ring.error::before { background: var(--red); }
    .pulse-ring.error::after  { border-color: var(--red); }

    @keyframes ping {
      0%   { transform: scale(1); opacity: 0.6; }
      80%  { transform: scale(2.2); opacity: 0; }
      100% { opacity: 0; }
    }

    .live-text {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.3;
    }

    /* Stat grid */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }

    .stat-value.mono {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 17px;
      letter-spacing: -0.01em;
    }

    /* Info bar */
    .info-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .info-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    .info-val {
      font-size: 15px;
      font-weight: 600;
      color: var(--green);
      text-align: right;
    }

    /* Driver badge */
    .driver-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 16px;
      display: flex;
      gap: 16px;
    }

    .badge-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .badge-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badge-val {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    /* Error box */
    .error-box {
      display: none;
      background: var(--red-bg);
      border: 1.5px solid var(--red);
      border-radius: var(--radius);
      padding: 20px;
    }

    .error-box.visible { display: block; }

    .error-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 8px;
    }

    .error-msg {
      font-size: 16px;
      line-height: 1.55;
      color: #fca5a5;
    }

    @media (prefers-reduced-motion: reduce) {
      .pulse-ring::after { animation: none; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
      </svg>
    </div>
    <div class="logo-text">Vanderbus GPS</div>
  </div>

  <!-- Error box -->
  <div class="error-box" id="error-box">
    <div class="error-title" id="error-title">Error</div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Setup card -->
  <div class="card" id="setup-card">
    <div class="form-stack">
      <div class="field">
        <label for="chofer">Nombre del chofer</label>
        <input type="text" id="chofer" placeholder="Nombre completo"
               autocomplete="name" inputmode="text">
      </div>
      <div class="field">
        <label for="patente">Patente del vehiculo</label>
        <input type="text" id="patente" placeholder="ABC 123"
               autocomplete="off" inputmode="text"
               style="text-transform: uppercase;">
      </div>
      <button class="btn btn-start" id="btn-start">Iniciar viaje</button>
    </div>
  </div>

  <!-- Tracking status panel -->
  <div class="status-panel" id="status-panel">

    <!-- Live status row -->
    <div class="live-row">
      <div class="pulse-ring" id="pulse-ring"></div>
      <div class="live-text" id="live-text">Esperando GPS...</div>
    </div>

    <!-- Driver info -->
    <div class="driver-badge" id="driver-badge">
      <div class="badge-item">
        <div class="badge-label">Chofer</div>
        <div class="badge-val" id="badge-chofer">-</div>
      </div>
      <div class="badge-item">
        <div class="badge-label">Patente</div>
        <div class="badge-val" id="badge-patente">-</div>
      </div>
    </div>

    <!-- GPS stats -->
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-label">Latitud</div>
        <div class="stat-value mono" id="stat-lat">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Longitud</div>
        <div class="stat-value mono" id="stat-lng">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Velocidad</div>
        <div class="stat-value" id="stat-speed">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Precision</div>
        <div class="stat-value" id="stat-prec">--</div>
      </div>
    </div>

    <!-- Last send info -->
    <div class="info-bar">
      <div class="info-label">Ultimo envio</div>
      <div class="info-val" id="last-send">Ninguno aun</div>
    </div>

    <!-- Stop button -->
    <button class="btn btn-stop" id="btn-stop">Detener viaje</button>

  </div>

</div>

<script>
  const SUPABASE_URL = 'https://mrfwcfuddvexqixfjnuh.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yZndjZnVkZHZleHFpeGZqbnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NDk3OTEsImV4cCI6MjA5NTMyNTc5MX0.ILsvCNJVmbuKT2JhyCIfhhL1Acnft-Uk2ia5Nl8R1MQ';

  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const MIN_INTERVAL_MS = 30000;

  let watchId         = null;
  let lastSendTime    = 0;
  let trackChofer     = '';
  let trackPatente    = '';
  let latestPosition  = null;
  let countdownTimer  = null;

  // Restore saved values
  const savedChofer  = localStorage.getItem('vb_chofer');
  const savedPatente = localStorage.getItem('vb_patente');
  if (savedChofer)  document.getElementById('chofer').value  = savedChofer;
  if (savedPatente) document.getElementById('patente').value = savedPatente;

  // --- UI helpers ---

  function showError(title, msg) {
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-msg').textContent   = msg;
    document.getElementById('error-box').classList.add('visible');
  }

  function hideError() {
    document.getElementById('error-box').classList.remove('visible');
  }

  function setLiveStatus(text, isError) {
    document.getElementById('live-text').textContent = text;
    const ring = document.getElementById('pulse-ring');
    ring.className = 'pulse-ring' + (isError ? ' error' : '');
  }

  function formatHora(ts) {
    return new Date(ts).toLocaleTimeString('es-AR', {
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  }

  function updateStats(coords) {
    const { latitude, longitude, speed, accuracy } = coords;
    document.getElementById('stat-lat').textContent   = latitude.toFixed(6);
    document.getElementById('stat-lng').textContent   = longitude.toFixed(6);
    document.getElementById('stat-speed').textContent = speed != null
      ? Math.round(speed * 3.6) + ' km/h'
      : '--';
    document.getElementById('stat-prec').textContent  = Math.round(accuracy) + ' m';
  }

  function updateCountdown() {
    if (!watchId) return;
    if (!latestPosition) {
      setLiveStatus('Esperando GPS...', false);
      return;
    }
    const elapsed   = Date.now() - lastSendTime;
    const remaining = Math.max(0, Math.ceil((MIN_INTERVAL_MS - elapsed) / 1000));
    if (remaining === 0) {
      setLiveStatus('Enviando ubicacion...', false);
    } else {
      setLiveStatus('Activo - proximo envio en ' + remaining + 's', false);
    }
  }

  // --- Supabase ---

  async function sendLocation(position) {
    const { latitude, longitude, speed, accuracy } = position.coords;

    const velocidad = speed != null
      ? Math.round(speed * 3.6 * 10) / 10   // m/s -> km/h, 1 decimal
      : null;

    const { error } = await db.from('ubicaciones').insert({
      chofer:      trackChofer,
      patente:     trackPatente,
      lat:         latitude,
      lng:         longitude,
      velocidad:   velocidad,
      precision_m: Math.round(accuracy)
    });

    return !error;
  }

  // --- GPS ---

  async function onPosition(position) {
    latestPosition = position;
    updateStats(position.coords);

    const now     = Date.now();
    const elapsed = now - lastSendTime;

    if (elapsed >= MIN_INTERVAL_MS) {
      setLiveStatus('Enviando ubicacion...', false);
      const ok = await sendLocation(position);
      if (ok) {
        lastSendTime = Date.now();
        document.getElementById('last-send').textContent = formatHora(lastSendTime);
        updateCountdown();
      } else {
        setLiveStatus('Error al enviar - reintentando...', true);
      }
    }
  }

  function onGpsError(err) {
    if (err.code === 1) {
      // PERMISSION_DENIED
      detenerViaje();
      showError(
        'Permiso de GPS denegado',
        'El navegador no tiene permiso para acceder a la ubicacion. ' +
        'Ir a Configuracion del telefono > Privacidad > Ubicacion y ' +
        'activar el permiso para este navegador.'
      );
    } else if (err.code === 2) {
      // POSITION_UNAVAILABLE
      setLiveStatus('Sin senal GPS - mover al exterior', true);
    } else {
      // TIMEOUT
      setLiveStatus('GPS tarda en responder...', false);
    }
  }

  // --- Acciones principales ---

  function iniciarViaje() {
    const chofer  = document.getElementById('chofer').value.trim();
    const patente = document.getElementById('patente').value.trim().toUpperCase();

    if (!chofer) {
      document.getElementById('chofer').focus();
      return;
    }
    if (!patente) {
      document.getElementById('patente').focus();
      return;
    }

    if (!navigator.geolocation) {
      showError(
        'GPS no disponible',
        'Este dispositivo o navegador no soporta GPS.'
      );
      return;
    }

    trackChofer  = chofer;
    trackPatente = patente;

    localStorage.setItem('vb_chofer',  chofer);
    localStorage.setItem('vb_patente', patente);

    hideError();
    lastSendTime   = 0;
    latestPosition = null;

    document.getElementById('badge-chofer').textContent  = chofer;
    document.getElementById('badge-patente').textContent = patente;
    document.getElementById('last-send').textContent     = 'Ninguno aun';
    document.getElementById('stat-lat').textContent      = '--';
    document.getElementById('stat-lng').textContent      = '--';
    document.getElementById('stat-speed').textContent    = '--';
    document.getElementById('stat-prec').textContent     = '--';

    setLiveStatus('Esperando GPS...', false);

    document.getElementById('setup-card').style.display  = 'none';
    document.getElementById('status-panel').classList.add('visible');

    watchId = navigator.geolocation.watchPosition(
      onPosition,
      onGpsError,
      { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
    );

    countdownTimer = setInterval(updateCountdown, 1000);
  }

  function detenerViaje() {
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }
    if (countdownTimer !== null) {
      clearInterval(countdownTimer);
      countdownTimer = null;
    }

    latestPosition = null;
    lastSendTime   = 0;

    document.getElementById('status-panel').classList.remove('visible');
    document.getElementById('setup-card').style.display = '';
  }

  // Wire up buttons
  document.getElementById('btn-start').addEventListener('click', iniciarViaje);
  document.getElementById('btn-stop').addEventListener('click', detenerViaje);

  // Allow uppercase on patente as user types
  document.getElementById('patente').addEventListener('input', function () {
    const pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(pos, pos);
  });
</script>
</body>
</html>
