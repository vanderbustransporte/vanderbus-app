name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # Valores dummy a propósito: src/lib/supabase.js aborta el arranque si
      # faltan, y el build necesita que existan. No se conecta a nada.
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ci.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-dummy-anon-key
